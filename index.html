<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="game-container">
    <header class="game-header">
      <h1 class="game-title">Snake</h1>
      <div class="score-panel">
        <span class="score-label">Score:</span>
        <span id="score-display" class="score-value">0</span>
      </div>
    </header>

    <div class="game-area">
      <canvas id="game-canvas" width="480" height="480"></canvas>
    </div>

    <div class="game-controls">
      <button type="button" data-game-action="start" class="btn btn-start">Start</button>
      <button type="button" data-game-action="pause" class="btn btn-pause">Pause</button>
      <button type="button" data-game-action="restart" class="btn btn-restart">Restart</button>
    </div>

    <aside class="leaderboard" id="leaderboard-container">
      <!-- Populated by M4 scoreboard module -->
    </aside>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
